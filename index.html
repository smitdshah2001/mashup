function loginSpotify() {
  const v = generateCodeVerifier(128);
  sessionStorage.setItem('pkce_verifier', v);
  generateCodeChallenge(v).then(function(ch) {
    window.location.href = 'https://accounts.spotify.com/authorize?' + new URLSearchParams({
      client_id: CLIENT_ID, response_type: 'code',
      redirect_uri: REDIRECT_URI, scope: SCOPES,
      code_challenge_method: 'S256', code_challenge: ch,
    });
  });
}

function generateCodeVerifier(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, function(b) { return chars[b % chars.length]; }).join('');
}

function generateCodeChallenge(v) {
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(v)).then(function(d) {
    return btoa(String.fromCharCode.apply(null, new Uint8Array(d)))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  });
}

function handleCallback(code) {
  return fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      client_id: CLIENT_ID, grant_type: 'authorization_code',
      code: code, redirect_uri: REDIRECT_URI,
      code_verifier: sessionStorage.getItem('pkce_verifier'),
    })
  }).then(function(res) { return res.json(); }).then(function(data) {
    if (data.access_token) {
      accessToken = data.access_token;
      localStorage.setItem('spotify_token', accessToken);
      window.history.replaceState({}, '', window.location.pathname);
      return initLibrary();
    } else {
      showToast('Auth failed — check Redirect URI in Spotify Dashboard');
    }
  });
}

function init() {
  const code = new URLSearchParams(window.location.search).get('code');
  if (code) { handleCallback(code); return; }
  const saved = localStorage.getItem('spotify_token');
  if (saved) { accessToken = saved; initLibrary(); }
  else showScreen('authScreen');
}

// ─────────────────────────────────────────────────────
// LIBRARY
// ─────────────────────────────────────────────────────
function initLibrary() {
  showScreen('libraryScreen');
  renderLibraryLoading();
  return resolveSpotifyIds().then(function() {
    renderLibrary();
    document.getElementById('playAllBtn').disabled = false;
  });
}

function renderLibraryLoading() {
  document.getElementById('songList').innerHTML = SONG_LIBRARY.map(function(s) {
    return '<div class="song-card"><div class="song-art-placeholder">🎵</div><div class="song-info"><div class="song-name">' + s.query + '</div><div class="song-segments"><span class="loader"></span>Loading...</div></div></div>';
  }).join('');
}

function resolveSpotifyIds() {
  const cached = localStorage.getItem('rmj-v3');
  if (cached) { resolvedSongs = JSON.parse(cached); return Promise.resolve(); }
  resolvedSongs = [];
  return SONG_LIBRARY.reduce(function(chain, s) {
    return chain.then(function() {
      return fetch('https://api.spotify.com/v1/search?q=' + encodeURIComponent(s.query) + '&type=track&limit=1', {
        headers: { Authorization: 'Bearer ' + accessToken }
      }).then(function(res) {
        if (res.status === 401) { localStorage.removeItem('spotify_token'); showScreen('authScreen'); return; }
        return res.json();
      }).then(function(data) {
        var t = data && data.tracks && data.tracks.items && data.tracks.items[0];
        resolvedSongs.push(Object.assign({}, s, {
          uri: t ? t.uri : null,
          name: t ? t.name : s.query,
          artist: t ? t.artists.map(function(a){return a.name;}).join(', ') : '',
          art: t ? (t.album.images[1] ? t.album.images[1].url : (t.album.images[0] ? t.album.images[0].url : null)) : null,
        }));
      }).catch(function() {
        resolvedSongs.push(Object.assign({}, s, { uri: null, name: s.query, artist: '', art: null }));
      });
    });
  }, Promise.resolve()).then(function() {
    localStorage.setItem('rmj-v3', JSON.stringify(resolvedSongs));
  });
}

function renderLibrary() {
  document.getElementById('songList').innerHTML = resolvedSongs.map(function(s) {
    return '<div class="song-card">' +
      (s.art ? '<img class="song-art" src="' + s.art + '" />' : '<div class="song-art-placeholder">🎵</div>') +
      '<div class="song-info"><div class="song-name">' + s.name + '</div><div class="song-artist">' + s.artist + '</div>' +
      '<div class="song-segments">✓ ' + s.segs.length + ' segments mapped</div></div></div>';
  }).join('');
}

// ─────────────────────────────────────────────────────
// MASHUP
// ─────────────────────────────────────────────────────
function startMashup() {
  mashupQueue = DJ_QUEUE_PLAN.map(function(item) {
    return { song: resolvedSongs[item[0]], seg: resolvedSongs[item[0]].segs[item[1]] };
  }).filter(function(x) { return x.song && x.song.uri; });
  if (!mashupQueue.length) { showToast('Songs not loaded yet!'); return; }
  currentQueueIdx = 0; isPaused = false; isPlaying = true;
  requestWakeLock();
  showScreen('djScreen');
  renderQueue();
  playSegment(0);
}

function playSegment(idx) {
  if (idx >= mashupQueue.length) {
    showToast('Mashup complete! Great run! 🎉');
    document.getElementById('djBadge').textContent = 'DONE';
    clearInterval(progressInterval);
    clearInterval(window._pollTimer);
    isPlaying = false; releaseWakeLock();
    return Promise.resolve();
  }
  var item = mashupQueue[idx];
  var song = item.song; var seg = item.seg;
  updateNowPlaying(item);
  renderQueue();
  return setVolume(100).then(function() {
    return fetch('https://api.spotify.com/v1/me/player/play', {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ uris: [song.uri], position_ms: seg.s * 1000 })
    });
  }).then(function() {
    return waitForPlayback(seg.s);
  }).then(function() {
    segmentStartTime = Date.now();
    segmentDuration = (seg.e - seg.s) * 1000;
    startProgress(seg.s, seg.e);
    startPolling(seg.e);
  });
}

function waitForPlayback(targetSec) {
  var attempts = 0;
  return new Promise(function(resolve) {
    function check() {
      if (attempts >= 10) { resolve(); return; }
      attempts++;
      setTimeout(function() {
        fetch('https://api.spotify.com/v1/me/player', {
          headers: { Authorization: 'Bearer ' + accessToken }
        }).then(function(res) {
          if (res.status === 204) { check(); return; }
          return res.json().then(function(data) {
            var pos = (data.progress_ms || 0) / 1000;
            if (data.is_playing && pos >= targetSec - 2) { resolve(); }
            else { check(); }
          });
        }).catch(function() { check(); });
      }, 300);
    }
    check();
  });
}

function startPolling(endSec) {
  clearInterval(window._pollTimer);
  window._pollTimer = setInterval(function() {
    if (isPaused) return;
    fetch('https://api.spotify.com/v1/me/player', {
      headers: { Authorization: 'Bearer ' + accessToken }
    }).then(function(res) {
      if (res.status === 204) return;
      return res.json().then(function(data) {
        var pos = (data.progress_ms || 0) / 1000;
        if (pos >= endSec - 0.5) {
          clearInterval(window._pollTimer);
          currentQueueIdx++;
          playSegment(currentQueueIdx);
        }
      });
    }).catch(function() {});
  }, POLL_INTERVAL);
}

function startProgress(s, e) {
  clearInterval(progressInterval);
  var total = e - s;
  progressInterval = setInterval(function() {
    if (isPaused) return;
    var elapsed = (Date.now() - segmentStartTime) / 1000;
    document.getElementById('progressFill').style.width = Math.min((elapsed/total)*100,100) + '%';
    document.getElementById('progCurrent').textContent = fmt(elapsed);
    document.getElementById('progEnd').textContent = fmt(total);
  }, 500);
}

function fmt(s) {
  s = Math.max(0, Math.floor(s));
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

function updateNowPlaying(item) {
  document.getElementById('npTitle').textContent = item.song.name;
  document.getElementById('npArtist').textContent = item.song.artist;
  document.getElementById('npSection').textContent = item.seg.l;
  document.getElementById('npArt').innerHTML = item.song.art ? '<img src="' + item.song.art + '" />' : '🎵';
}

function renderQueue() {
  var p = document.getElementById('queuePanel');
  p.innerHTML = '<div class="queue-title">Up Next</div>' +
    mashupQueue.map(function(item, i) {
      return '<div class="queue-item ' + (i===currentQueueIdx?'active':'') + '">' +
        '<span class="queue-num">' + (i===currentQueueIdx?'▶':i+1) + '</span>' +
        '<span>' + item.song.name + '</span>' +
        '<span class="queue-seg-info">' + item.seg.l + '</span></div>';
    }).join('');
  var active = p.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function nextSegment() {
  clearInterval(window._pollTimer);
  setVolume(100);
  currentQueueIdx++;
  playSegment(currentQueueIdx);
}

function prevSegment() {
  clearInterval(window._pollTimer);
  setVolume(100);
  currentQueueIdx = Math.max(0, currentQueueIdx - 1);
  playSegment(currentQueueIdx);
}

function togglePlayPause() {
  var btn = document.getElementById('playPauseBtn');
  var lockBtn = document.getElementById('lockPauseBtn');
  if (!isPaused) {
    isPaused = true; pausedAt = Date.now();
    clearInterval(window._pollTimer);
    btn.textContent = '▶'; if (lockBtn) lockBtn.textContent = '▶ Resume';
    fetch('https://api.spotify.com/v1/me/player/pause', { method:'PUT', headers:{ Authorization:'Bearer ' + accessToken } });
    releaseWakeLock();
  } else {
    isPaused = false; segmentStartTime += (Date.now() - pausedAt);
    btn.textContent = '⏸'; if (lockBtn) lockBtn.textContent = '⏸ Pause';
    fetch('https://api.spotify.com/v1/me/player/play', { method:'PUT', headers:{ Authorization:'Bearer ' + accessToken } });
    requestWakeLock();
    startPolling(mashupQueue[currentQueueIdx].seg.e);
  }
}

function stopAndGoBack() {
  clearInterval(window._pollTimer); clearInterval(progressInterval);
  isPlaying = false; releaseWakeLock();
  disableTouchLock();
  fetch('https://api.spotify.com/v1/me/player/pause', { method:'PUT', headers:{ Authorization:'Bearer ' + accessToken } }).catch(function(){});
  showScreen('libraryScreen');
}

function setVolume(pct) {
  return fetch('https://api.spotify.com/v1/me/player/volume?volume_percent=' + pct, {
    method: 'PUT', headers: { Authorization: 'Bearer ' + accessToken }
  }).catch(function(){});
}

// ─────────────────────────────────────────────────────
// TOUCH LOCK
// ─────────────────────────────────────────────────────
function enableTouchLock() {
  document.getElementById('touchLock').classList.add('active');
  showToast('Screen locked 🔒');
}

function disableTouchLock() {
  document.getElementById('touchLock').classList.remove('active');
}

// ─────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}

// ─────────────────────────────────────────────────────
// EVENT LISTENERS — all wired here, no inline onclick
// ─────────────────────────────────────────────────────
window.addEventListener('load', function() {
  document.getElementById('connectBtn').addEventListener('click', loginSpotify);
  document.getElementById('playAllBtn').addEventListener('click', startMashup);
  document.getElementById('backBtn').addEventListener('click', stopAndGoBack);
  document.getElementById('prevBtn').addEventListener('click', prevSegment);
  document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
  document.getElementById('nextBtn').addEventListener('click', nextSegment);
  document.getElementById('lockScreenBtn').addEventListener('click', enableTouchLock);
  document.getElementById('lockPauseBtn').addEventListener('click', function() { togglePlayPause(); });
  document.getElementById('lockNextBtn').addEventListener('click', nextSegment);
  document.getElementById('lockUnlockBtn').addEventListener('click', disableTouchLock);

  // Re-acquire wake lock when tab becomes visible again
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && isPlaying && !isPaused) {
      requestWakeLock();
    }
  });

  init();
});
</script>
</body>
</html>

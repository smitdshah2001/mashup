function generateCodeVerifier(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, b => chars[b % chars.length]).join('');
}

async function generateCodeChallenge(v) {
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

    await initLibrary();
  } else {
    showToast('Auth failed — check Redirect URI in Spotify Dashboard');
  }
}

async function init() {
  const code = new URLSearchParams(window.location.search).get('code');
  if (code) { await handleCallback(code); return; }
  const saved = localStorage.getItem('spotify_token');
  if (saved) { accessToken = saved; await initLibrary(); }
  else showScreen('authScreen');
}

async function initLibrary() {
  showScreen('libraryScreen');
  renderLibraryLoading();
  await resolveSpotifyIds();
  renderLibrary();
  document.getElementById('playAllBtn').disabled = false;
}

function renderLibraryLoading() {
  document.getElementById('songList').innerHTML = SONG_LIBRARY.map(s => `
    <div class="song-card">
      <div class="song-art-placeholder">🎵</div>
      <div class="song-info">
        <div class="song-name">${s.query}</div>
        <div class="song-segments"><span class="loader"></span>Loading...</div>
      </div>
    </div>`).join('');
}

async function resolveSpotifyIds() {
  const cached = localStorage.getItem('rmj-v3');
  if (cached) { resolvedSongs = JSON.parse(cached); return; }
  resolvedSongs = [];
  for (const s of SONG_LIBRARY) {
    try {
      const res = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(s.query)}&type=track&limit=1`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (res.status === 401) { localStorage.removeItem('spotify_token'); showScreen('authScreen'); return; }
      const data = await res.json();
      const t = data.tracks?.items?.[0];
      resolvedSongs.push({
        ...s,
        uri: t?.uri || null,
        name: t?.name || s.query,
        artist: t?.artists?.map(a => a.name).join(', ') || '',
        art: t?.album?.images?.[1]?.url || t?.album?.images?.[0]?.url || null,
      });
    } catch(e) {
      resolvedSongs.push({ ...s, uri: null, name: s.query, artist: '', art: null });
    }
  }
  localStorage.setItem('rmj-v3', JSON.stringify(resolvedSongs));
}

function renderLibrary() {
  document.getElementById('songList').innerHTML = resolvedSongs.map(s => `
    <div class="song-card">
      ${s.art ? `<img class="song-art" src="${s.art}" />` : `<div class="song-art-placeholder">🎵</div>`}
      <div class="song-info">
        <div class="song-name">${s.name}</div>
        <div class="song-artist">${s.artist}</div>
        <div class="song-segments">✓ ${s.segs.length} segments mapped</div>
      </div>
    </div>`).join('');
}

function startMashup() {
  mashupQueue = DJ_QUEUE_PLAN.map(([si, gi]) => ({
    song: resolvedSongs[si], seg: resolvedSongs[si].segs[gi]
  })).filter(x => x.song?.uri);
  if (!mashupQueue.length) { showToast('Songs not loaded yet!'); return; }
  currentQueueIdx = 0; isPaused = false; isFading = false;
  showScreen('djScreen');
  renderQueue();
  playSegment(0);
}

async function playSegment(idx) {
  if (idx >= mashupQueue.length) {
    showToast('Mashup complete! Great run! 🎉');
    document.getElementById('djBadge').textContent = 'DONE';
    clearInterval(progressInterval); return;
  }
  const { song, seg } = mashupQueue[idx];
  updateNowPlaying(mashupQueue[idx]);
  renderQueue();
  await setVolume(100);
  await fetch('https://api.spotify.com/v1/me/player/play', {
    method: 'PUT',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ uris: [song.uri], position_ms: seg.s * 1000 })
  });
  segmentStartTime = Date.now();
  segmentDuration = (seg.e - seg.s) * 1000;
  startProgress(seg.s, seg.e);
  clearTimeout(window._segTimer);
  window._segTimer = setTimeout(() => { if (!isPaused) fadeOutAndNext(); }, segmentDuration - (FADE_STEPS * FADE_INTERVAL));
}

async function fadeOutAndNext() {
  if (isFading) return;
  isFading = true;
  await fadeVolume(100, 0);
  isFading = false;
  currentQueueIdx++;
  await playSegment(currentQueueIdx);
}

async function fadeVolume(from, to) {
  const step = (to - from) / FADE_STEPS;
  let vol = from;
  for (let i = 0; i < FADE_STEPS; i++) {
    vol += step;
    await setVolume(Math.round(Math.max(0, Math.min(100, vol))));
    await sleep(FADE_INTERVAL);
  }
}

async function setVolume(pct) {
  try {
    await fetch(`https://api.spotify.com/v1/me/player/volume?volume_percent=${pct}`, {
      method: 'PUT', headers: { Authorization: `Bearer ${accessToken}` }
    });
  } catch(e) {}
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function startProgress(s, e) {
  clearInterval(progressInterval);
  const total = e - s;
  progressInterval = setInterval(() => {
    if (isPaused) return;
    const elapsed = (Date.now() - segmentStartTime) / 1000;
    document.getElementById('progressFill').style.width = Math.min((elapsed/total)*100,100) + '%';
    document.getElementById('progCurrent').textContent = fmt(elapsed);
    document.getElementById('progEnd').textContent = fmt(total);
  }, 500);
}

function fmt(s) {
  s = Math.max(0, Math.floor(s));
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function updateNowPlaying({ song, seg }) {
  document.getElementById('npTitle').textContent = song.name;
  document.getElementById('npArtist').textContent = song.artist;
  document.getElementById('npSection').textContent = seg.l;
  document.getElementById('npArt').innerHTML = song.art ? `<img src="${song.art}" />` : '🎵';
}

function renderQueue() {
  const p = document.getElementById('queuePanel');
  p.innerHTML = `<div class="queue-title">Up Next</div>` +
    mashupQueue.map((item, i) => `
      <div class="queue-item ${i===currentQueueIdx?'active':''}">
        <span class="queue-num">${i===currentQueueIdx?'▶':i+1}</span>
        <span>${item.song.name}</span>
        <span class="queue-seg-info">${item.seg.l}</span>
      </div>`).join('');
  p.querySelector('.active')?.scrollIntoView({ block: 'nearest' });
}

async function nextSegment() {
  clearTimeout(window._segTimer); isFading = false;
  await setVolume(100); currentQueueIdx++;
  await playSegment(currentQueueIdx);
}

async function prevSegment() {
  clearTimeout(window._segTimer); isFading = false;
  await setVolume(100); currentQueueIdx = Math.max(0, currentQueueIdx - 1);
  await playSegment(currentQueueIdx);
}

async function togglePlayPause() {
  const btn = document.getElementById('playPauseBtn');
  if (!isPaused) {
    isPaused = true; pausedAt = Date.now(); clearTimeout(window._segTimer);
    btn.textContent = '▶';
    await fetch('https://api.spotify.com/v1/me/player/pause', { method:'PUT', headers:{ Authorization:`Bearer ${accessToken}` } });
  } else {
    isPaused = false; segmentStartTime += (Date.now() - pausedAt);
    const remaining = segmentDuration - (Date.now() - segmentStartTime);
    clearTimeout(window._segTimer);
    window._segTimer = setTimeout(() => { if(!isPaused) fadeOutAndNext(); }, Math.max(0, remaining - FADE_STEPS*FADE_INTERVAL));
    btn.textContent = '⏸';
    await fetch('https://api.spotify.com/v1/me/player/play', { method:'PUT', headers:{ Authorization:`Bearer ${accessToken}` } });
  }
}

function stopAndGoBack() {
  clearTimeout(window._segTimer); clearInterval(progressInterval);
  isFading = false; setVolume(100);
  fetch('https://api.spotify.com/v1/me/player/pause', { method:'PUT', headers:{ Authorization:`Bearer ${accessToken}` } }).catch(()=>{});
  showScreen('libraryScreen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

window.addEventListener('load', init);
</script>
</body>
</html>
